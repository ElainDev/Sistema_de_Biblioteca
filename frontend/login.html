<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">

</head>

<body>
    <div class="container-esquerda">
        <div class="bem-vindo">
            <h1>Bem vindo(a)</h1>
            <p>Por favor, insira seus dados.</p>
        </div>
        <form class="subcontainer-inputs">
            <span>
                <label>Email</label>
                <input placeholder="Digite o nome o email..." type="email" required>
            </span>
            <span>
                <label>Senha</label>
                <input placeholder="Digite a senha..." type="password" required>
            </span>
            <button type="submit" class="botao-entrar">ENTRAR</button>
        </form>
        <a href="#" class="cadastro_login">Não tem uma conta? Cadastre-se</a>
    </div>

    <!--IMAGEM DIREITA-->
    <div class="container-direita">
        <img src="assets/img/imagem_biblioteca.jpeg" alt="" class="img-biblioteca">
    </div>


</body>

</html>
